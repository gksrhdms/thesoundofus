<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>comments — 부딪힘소리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a class="site-name" href="index.html">부딪힘소리</a>
    <a class="nav-about" href="about.html">About</a>
    <a class="nav-about" href="comments.html">Comments</a>
  </nav>

  <main>
    <div class="about-layout">
      <div class="about-left"></div>
      <div class="about-body">
        <p>이곳을 방문한 흔적을 남겨주세요.<br>이름과 하고 싶은 말, 그것으로 충분합니다.</p>

        <form class="comment-form" id="commentForm">
          <input type="text" id="nameInput" placeholder="이름 또는 별명" maxlength="30" autocomplete="off" />
          <textarea id="msgInput" placeholder="하고 싶은 말을 남겨주세요." maxlength="300"></textarea>
          <button type="submit">남기기</button>
        </form>
      </div>
    </div>
  </main>

  <div class="comments-canvas" id="commentsCanvas"></div>

  <script>
  (function () {
    var KEY = 'budichumsori_guestbook';
    var placed = [];

    function load() {
      try { return JSON.parse(localStorage.getItem(KEY)) || []; }
      catch (e) { return []; }
    }

    function save(data) {
      localStorage.setItem(KEY, JSON.stringify(data));
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function hasOverlap(rect, pad) {
      for (var i = 0; i < placed.length; i++) {
        var r = placed[i];
        if (rect.x < r.x + r.w + pad &&
            rect.x + rect.w + pad > r.x &&
            rect.y < r.y + r.h + pad &&
            rect.y + rect.h + pad > r.y) {
          return true;
        }
      }
      return false;
    }

    function findPos(w, h, cw) {
      var pad  = 32;
      var maxX = Math.max(0, cw - w - pad);
      for (var i = 0; i < 100; i++) {
        var x     = pad + Math.random() * maxX;
        var range = 200 + placed.length * 65;
        var y     = 10 + Math.random() * range;
        var rect  = { x: x, y: y, w: w, h: h };
        if (!hasOverlap(rect, pad)) {
          placed.push(rect);
          return { x: x, y: y };
        }
      }
      var fy = placed.reduce(function (m, r) { return Math.max(m, r.y + r.h); }, 0) + 24;
      var fx = pad + Math.random() * maxX;
      placed.push({ x: fx, y: fy, w: w, h: h });
      return { x: fx, y: fy };
    }

    function render() {
      var canvas = document.getElementById('commentsCanvas');
      canvas.innerHTML = '';
      placed = [];

      var comments = load();

      if (!comments.length) {
        var ep = document.createElement('p');
        ep.className = 'comments-empty';
        ep.textContent = '아직 기록이 없습니다.';
        canvas.appendChild(ep);
        canvas.style.height = '80px';
        return;
      }

      var cw        = canvas.offsetWidth || (window.innerWidth - 40);
      var maxBottom = 0;

      comments.forEach(function (c) {
        var el = document.createElement('div');
        el.className = 'floating-comment';
        el.style.visibility = 'hidden';
        el.innerHTML =
          '<span class="fc-name">' + esc(c.name) + '</span>' +
          '<span class="fc-msg">'  + esc(c.msg)  + '</span>';
        canvas.appendChild(el);

        var br  = el.getBoundingClientRect();
        var w   = Math.max(br.width  || 0, 40);
        var h   = Math.max(br.height || 0, 20);
        var pos = findPos(w, h, cw);
        var rot = (Math.random() * 5 - 2.5).toFixed(1);

        el.style.left        = pos.x + 'px';
        el.style.top         = pos.y + 'px';
        el.style.transform   = 'rotate(' + rot + 'deg)';
        el.style.visibility  = 'visible';

        maxBottom = Math.max(maxBottom, pos.y + h);
      });

      canvas.style.height = (maxBottom + 80) + 'px';
    }

    document.getElementById('commentForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var name = document.getElementById('nameInput').value.trim();
      var msg  = document.getElementById('msgInput').value.trim();
      if (!name || !msg) return;

      var data = load();
      data.push({ name: name, msg: msg });
      save(data);

      document.getElementById('nameInput').value = '';
      document.getElementById('msgInput').value  = '';

      render();
    });

    render();
  })();
  </script>

</body>
</html>
